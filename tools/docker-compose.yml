#
# Embedded Security Testing Lab
# Docker Compose configuration
#
# Usage:
#   docker-compose up -d      # Start the lab
#   docker-compose down       # Stop the lab
#   docker-compose logs -f    # View logs
#

services:
  est-lab:
    build:
      context: ./lab
      dockerfile: Dockerfile
    image: est-lab:latest
    container_name: est-lab
    ports:
      - "8080:5000"
    volumes:
      # Persistent upload storage
      - est-uploads:/data/uploads
      # Mount sample firmware (optional)
      - ./samples:/samples:ro
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  est-uploads:
    driver: local
